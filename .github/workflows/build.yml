name: Build APK
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📱 Build APK
        run: bun x eas-cli build -p android --profile preview --non-interactive
